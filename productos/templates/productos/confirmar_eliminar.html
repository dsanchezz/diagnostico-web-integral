{% extends 'base.html' %}
{% block title %}Eliminar {{ producto.nombre }} — Mi Tienda{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto fade-in">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100 text-center">
        <div class="bg-red-50 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        </div>
        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">¿Eliminar producto?</h1>
        <p class="text-gray-500 mb-2">Estás a punto de eliminar:</p>
        <p class="text-lg font-bold text-gray-800 mb-1">"{{ producto.nombre }}"</p>
        <p class="text-sm text-gray-400 mb-8">Esta acción lo marcará como inactivo.</p>
        <form method="POST" class="flex gap-4">
            {% csrf_token %}
            <a href="{% url 'productos:lista' %}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3.5 rounded-xl font-semibold text-sm transition duration-200">Cancelar</a>
            <button type="submit" class="flex-1 btn-danger text-white py-3.5 rounded-xl font-semibold text-sm shadow-lg">Sí, eliminar</button>
        </form>
    </div>
</div>
{% endblock %}
